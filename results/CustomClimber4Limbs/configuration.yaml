default_settings: null
behaviors:
  Climber:
    trainer_type: custom_ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 8192
      learning_rate: 0.001
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
      shared_critic: false
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
      encoder_config: Assets/climber_encoder.yaml
    checkpoint_interval: 500000
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
      memory: null
      goal_conditioning_type: hyper
      deterministic: false
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
        network_settings:
          normalize: false
          hidden_units: 128
          num_layers: 2
          vis_encode_type: simple
          memory: null
          goal_conditioning_type: hyper
          deterministic: false
    init_path: null
    keep_checkpoints: 5
    even_checkpoints: false
    max_steps: 500000
    time_horizon: 1000
    summary_freq: 1000
    threaded: false
    self_play: null
    behavioral_cloning: null
env_settings:
  env_path: null
  env_args: null
  base_port: 5005
  num_envs: 1
  num_areas: 1
  timeout_wait: 60
  seed: -1
  max_lifetime_restarts: 10
  restarts_rate_limit_n: 1
  restarts_rate_limit_period_s: 60
engine_settings:
  width: 84
  height: 84
  quality_level: 5
  time_scale: 20
  target_frame_rate: -1
  capture_frame_rate: 60
  no_graphics: false
  no_graphics_monitor: false
environment_parameters:
  decision_period:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8054
          value: 2
      name: decision_period
      completion_criteria: null
  decision_step:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8055
          value: 0
      name: decision_step
      completion_criteria: null
  take_actions_between_decisions:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8056
          value: 1
      name: take_actions_between_decisions
      completion_criteria: null
  agent_max_step:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8057
          value: 10000
      name: agent_max_step
      completion_criteria: null
  motor_multiplier:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8058
          value: 100
      name: motor_multiplier
      completion_criteria: null
  strain_threshold:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8059
          value: 5000
      name: strain_threshold
      completion_criteria: null
  strain_penalty_scale:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8060
          value: 1.0e-05
      name: strain_penalty_scale
      completion_criteria: null
  fall_y_threshold:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8061
          value: -5
      name: fall_y_threshold
      completion_criteria: null
  fall_penalty:
    curriculum:
    - value:
        sampler_type: constant
        sampler_parameters:
          seed: 8062
          value: 1.0
      name: fall_penalty
      completion_criteria: null
checkpoint_settings:
  run_id: CustomClimber4Limbs
  initialize_from: null
  load_model: false
  resume: false
  force: false
  train_model: false
  inference: false
  results_dir: results
torch_settings:
  device: null
debug: false
