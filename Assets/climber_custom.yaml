# Training configuration using the custom_ppo trainer with split observation
# encoders.  The Conv1D vision encoder is described in climber_encoder.yaml.
#
# Usage:
#   python train.py Assets/climber_custom.yaml --run-id=CustomClimber
#
# Parallel training: num_areas must match WallClimberParallelTrainingBootstrap.DefaultNumAreas
# (and the component's numAreas in the Inspector if overridden). With env_path: null (Editor),
# num_envs must stay 1. For a built executable, you can use num_envs: 4 instead of/in addition
# to num_areas — see ML-Agents docs.

env_settings:
  env_path: build/
  num_envs: 4
  num_areas: 1
  # Optional: extra Unity CLI args (windowed + size). Uncomment if Player Settings defaults are wrong:
  # env_args:
  #   - -screen-fullscreen
  #   - "0"
  #   - -screen-width
  #   - "1600"
  #   - -screen-height
  #   - "900"

behaviors:
  Climber:
    trainer_type: custom_ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
      encoder_config: Assets/climber_encoder.yaml
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 1000
    summary_freq: 30000
